        summary: 'Supervisor: Professor Pengyu Hong. Doc2Agent builds an automated pipeline that converts unstructured REST API documentation into validated Python tools for more reliable LLM API calling.'
        highlights:
          - Ran the full experimental pipeline across 744 real-world API endpoints, all WebArena environments, and scientific APIs, achieving a 55.1% improvement over baseline API-calling agents.
          - Deployed the full WebArena backend stack on AWS using AMIs and Docker, including security group and endpoint setup for reproducible benchmarking.
          - Designed and integrated a Python execution module extending the API agent into a CodeAct-style agent for conditional, multi-step reasoning.
          - Fine-tuned Gemma-3 models for structured API information extraction from unstructured API documentation.

      - company: NeurIPS 2025 MindGames Challenge
        position: Team Member
        location: Remote
        start_date: 2025-09
        end_date: 2025-11
        summary: Built and evaluated LLM agents for social reasoning, theory of mind, hidden-information reasoning, and strategic planning in interactive multi-agent environments.
        highlights:
          - Built a custom LLM-driven agent with personality traits encoded into model state for consistent behavior styles.
          - Implemented behavior logic and trait-steering mechanisms, and managed simulation setup and execution.

